<html>
<head>
<style>
table,th,td{
border:1px solid black;
}
</style>
</head>
<body>
<h1>colspan and rowspan</h1>
<h3>cell that spans two columns:</h3>
<table>
<tr>
<th>name</th>
<th>email</th>
<th colspan="2">phone</th>
</tr>
<tr>
<td>abc</td>
<td>abc@gmail.com</td>
<td>123-450926</td>
<td>950341-926</td>
</tr>
</table>
<h3>cell that spans two rows:</h3>
<table>
<tr>
<th>name:</th>
<td>abc</td>
</tr>
<tr>
<th>email</th>
<td>abc@gmail.com</td>
</tr>
<tr>
<th rowspan="2">phone:</th>
<td>123-345-0925</td>
</tr>
<tr>
<td>231567098</td>
</tr>
</table>
</body>
</html>
